
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>autoLV</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      text-align: center;
      max-width: 1100px;
      margin: 40px auto;
    }
    .section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    select, input, button {
      padding: 0 8px;
    }
    button {
      cursor: pointer;
    }
    #sido {
      width: 200px;
      height: 39px;
      font-size: 20px;
      border-radius: 8px;
    }
    #sigungu {
      width: 220px;
      height: 39px;
      font-size: 20px;
      border-radius: 8px;
    }
    #dong {
      width: 220px;
      height: 39px;
      font-size: 20px;
      border-radius: 8px;
    }
    #is_san {
      width: 200px;
      height: 39px;
      font-size: 20px;
      border-radius: 8px;
    }
    #main_no {
      width: 175px;
      height: 39px;
      font-size: 20px;
      border-radius: 8px;
    }
    #sub_no {
      width: 175px;
      height: 39px;
      font-size: 20px;
      border-radius: 8px;
    }
    #add-btn {
      width: 330px;
      height: 50px;
      font-size: 25px;
      font-weight: bold;
      border-radius: 8px;
    }
    #query-btn {
      width: 330px;
      height: 50px;
      font-size: 25px;
      font-weight: bold;
      border-radius: 8px;
    }
    #hyphen {
      font-size: 20px;
      padding: 0 8px;
    }
    button.delete {
      background-color: white;
      border: none;
      color: red;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #888;
      padding: 8px 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1><strong>autoLV</strong></h1>

  <div class="section">
    <select id="sido" onchange="loadSigungu()"><option value="">시/도 선택</option></select>
    <select id="sigungu" onchange="loadDong()"><option value="">시/군/구 선택</option></select>
    <select id="dong"><option value="">읍/면/동 선택</option></select>
  </div>

  <div class="section">
    <select id="is_san">
      <option value="false">일반</option>
      <option value="true">산</option>
    </select>
    <input type="text" id="main_no" placeholder="본번 입력" />
    <span id="hyphen">-</span>
    <input type="text" id="sub_no" placeholder="부번 입력" />
  </div>

  <div class="section">
    <button id="add-btn" onclick="addRow()">추가</button>
    <button id="query-btn" onclick="query()">조회</button>
  </div>

  <table id="result-table">
    <thead>
      <tr>
        <th>순번</th>
        <th>주소</th>
        <th>개별공시지가</th>
        <th>공시일자</th>
        <th>삭제</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="section">
    <button>엑셀 업로드</button>
    <button onclick="downloadCSV()">결과 다운로드</button>
  </div>

<script>
let count = 1;
let ldMap = {};

window.onload = async () => {
  try {
    const res = await fetch("ld_codes.json");
    ldMap = await res.json();
    const sidoSel = document.getElementById("sido");
    Object.keys(ldMap).forEach(sido => {
      sidoSel.innerHTML += `<option value="${sido}">${sido}</option>`;
    });
  } catch (e) {
    alert("법정동코드 데이터를 불러오는 데 실패했습니다.");
    console.error(e);
  }
};

function loadSigungu() {
  const sido = document.getElementById("sido").value;
  const sigunguSel = document.getElementById("sigungu");
  sigunguSel.innerHTML = `<option value="">시/군/구 선택</option>`;
  document.getElementById("dong").innerHTML = `<option value="">읍/면/동 선택</option>`;
  if (!sido) return;
  Object.keys(ldMap[sido]).forEach(sg => {
    sigunguSel.innerHTML += `<option value="${sg}">${sg}</option>`;
  });
}

function loadDong() {
  const sido = document.getElementById("sido").value;
  const sigungu = document.getElementById("sigungu").value;
  const dongSel = document.getElementById("dong");
  dongSel.innerHTML = `<option value="">읍/면/동 선택</option>`;
  if (!sido || !sigungu) return;
  Object.keys(ldMap[sido][sigungu]).forEach(dong => {
    dongSel.innerHTML += `<option value="${dong}">${dong}</option>`;
  });
}

function addRow() {
  const sido = document.getElementById("sido").value;
  const sigungu = document.getElementById("sigungu").value;
  const dong = document.getElementById("dong").value;
  const ld_code = ldMap[sido]?.[sigungu]?.[dong];
  const main = document.getElementById("main_no").value;
  const sub = document.getElementById("sub_no").value;
  const san = document.getElementById("is_san").value;

  if (!ld_code || !main) {
    alert("주소와 본번을 입력하세요");
    return;
  }

  const tbody = document.querySelector("#result-table tbody");
  const row = tbody.insertRow();
  row.innerHTML = `
    <td></td>
    <td data-ld="${ld_code}" data-main="${main}" data-sub="${sub}" data-san="${san}">
      ${sido} ${sigungu} ${dong} ${san === "true" ? "산 " : ""}${main}${sub ? '-' + sub : ''}
    </td>
    <td>-</td>
    <td>-</td>
    <td><button class="delete" onclick="deleteRow(this)">✕</button></td>
  `;

  updateRowNumbers(); // 순번 업데이트
}
function deleteRow(button) {
  const row = button.closest('tr');
  row.remove();
  updateRowNumbers();
}
function updateRowNumbers() {
  const rows = document.querySelectorAll("#result-table tbody tr");
  rows.forEach((row, index) => {
    row.cells[0].innerText = index + 1;
  });
}

async function query() {
  const rows = document.querySelectorAll("#result-table tbody tr");

  for (const row of rows) {
    const priceCell = row.cells[2];
    const dateCell = row.cells[3];

    // 이미 조회된 경우 넘어감
    if (priceCell.innerText !== "-" && priceCell.innerText !== "요청 실패" && priceCell.innerText !== "조회 실패") {
      continue;
    }

    const td = row.cells[1];
    const ld = td.dataset.ld;
    const main = td.dataset.main;
    const san = td.dataset.san;

    let sub = td.dataset.sub;
    if (!sub || sub.trim() === "") {
        sub = 0;
    } else {
        sub = Number(sub);
    }

    try {
      const res = await fetch(`http://127.0.0.1:8000/landprice/api?ld_code=${ld}&main_no=${main}&sub_no=${sub}&is_san=${san}`);
      const data = await res.json();
      priceCell.innerText = data.price_per_m2 ? `${Number(data.price_per_m2).toLocaleString()} 원/m²` : "조회 실패";
      dateCell.innerText = data.date ?? "-";
    } catch (e) {
      priceCell.innerText = "요청 실패";
      dateCell.innerText = "-";
    }
  }
}


function downloadCSV() {
  const rows = document.querySelectorAll("#result-table tr");
  const csv = [];

  rows.forEach((row, idx) => {
    const cells = Array.from(row.querySelectorAll("th, td"));

    // 첫 행은 헤더 → "삭제" 제외
    if (idx === 0) {
      cells.pop();  // 마지막 "삭제" 헤더 제거
    } else {
      cells.pop();  // 각 데이터 행에서 삭제 버튼 열 제거
    }

    const rowData = cells.map(td => `"${td.innerText}"`);
    csv.push(rowData.join(","));
  });

  const BOM = "\uFEFF";  // UTF-8 with BOM
  const blob = new Blob([BOM + csv.join("\n")], { type: "text/csv;charset=utf-8;" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "개별공시지가.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}


</script>

</body>
</html>
